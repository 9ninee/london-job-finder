name: Fetch & Update Jobs

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:          # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write             # Needed to commit jobs.json back to the repo

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Fetch jobs
        env:
          ADZUNA_APP_ID:  ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          REED_API_KEY:   ${{ secrets.REED_API_KEY }}
        run: python fetch_jobs_static.py

      - name: Commit updated jobs.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/jobs.json
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: update jobs data [skip ci]"
          # Retry with rebase in case another run pushed while we were fetching
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push rejected, rebasing (attempt $i)..."
            git pull --rebase -X ours origin main || git rebase --abort
          done
          echo "Failed to push after retries" >&2
          exit 1
